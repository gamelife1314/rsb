name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATESIO_TOKEN }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Publish to crates.io
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Publish to crates.io
        run: cargo publish

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-crates
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          ref: ${{ github.ref }}
          token: ${{ env.GITHUB_TOKEN }}

  # Build and upload binaries - native platforms only
  upload-binaries-linux:
    name: Upload Binaries (Linux x86_64)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rsb
          target: x86_64-unknown-linux-gnu
          archive: rsb-x86_64-unknown-linux-gnu
          token: ${{ env.GITHUB_TOKEN }}

  upload-binaries-macos:
    name: Upload Binaries (macOS)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rsb
          target: x86_64-apple-darwin
          archive: rsb-x86_64-apple-darwin
          token: ${{ env.GITHUB_TOKEN }}

  upload-binaries-windows:
    name: Upload Binaries (Windows)
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rsb
          target: x86_64-pc-windows-msvc
          archive: rsb-x86_64-pc-windows-msvc
          token: ${{ env.GITHUB_TOKEN }}

  # Build and push Docker images
  push-docker:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: publish-crates
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GITHUB_TOKEN }}
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            gamelife1314/rsb:latest
            gamelife1314/rsb:${{ steps.version.outputs.VERSION }}
            ghcr.io/gamelife1314/rsb:latest
            ghcr.io/gamelife1314/rsb:${{ steps.version.outputs.VERSION }}
